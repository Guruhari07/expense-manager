<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple and colorful daily expense calculator to track your transactions and balance.">
    <title>Expense Calculator</title>
    <!-- Cross-platform PWA settings -->
    <meta name="theme-color" content="#6e56ff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div>
                <h1>Expense Calculator</h1>
                <p style="color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-top: 0.3rem;">Track your daily transactions</p>
            </div>
            <div class="total-balance" id="totalBalance">₹0.00</div>
        </header>

        <main class="app-content">
            <section class="input-section">
                <h2>New Transaction</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Expense / Item</label>
                        <input type="text" id="description" placeholder="e.g., Groceries, Rent" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="add-btn">
                        <span>Save Transaction</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
            </section>

            <section class="table-section">
                <h2>Transaction History</h2>
                <div class="table-wrapper">
                    <table id="transactionsTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Item</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Balance</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyState">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <p>No transactions yet. Add your first expense to get started!</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log("Service Worker Registered!"))
                .catch(err => console.error("Service Worker registration failed:", err));
            });
        }
    </script>
</body>
</html>
